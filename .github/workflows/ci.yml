name: Go CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Install ALSA dependencies for Audio (Ubuntu only)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev

    - name: Download dependencies
      run: go mod download

    - name: Build (Linux/macOS)
      if: runner.os != 'Windows'
      run: go build -v -o audio-cli ./cmd/audio-cli

    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: go build -v -o audio-cli.exe ./cmd/audio-cli

    - name: Test
      run: go test -v ./...

    - name: Upload Artifact (Linux/macOS)
      if: runner.os != 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: audio-cli-${{ matrix.os }}
        path: audio-cli

    - name: Upload Artifact (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: audio-cli-${{ matrix.os }}
        path: audio-cli.exe
