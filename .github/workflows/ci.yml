name: Go CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Install ALSA dependencies for Audio
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev

    - name: Download dependencies
      run: go mod download

    - name: Build
      run: go build -v -o audio-cli ./cmd/audio-cli

    - name: Test
      run: go test -v ./...

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: audio-cli-ubuntu
        path: audio-cli
